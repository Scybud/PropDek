<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ledger Pro - Personal Expense Analytics</title>
    <style>
        :root {
            --bg-main: #000000;
            --bg-surface: #101010;
            --bg-element: #1a1a1a;
            --border-color: #30363d;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --accent-income: #2ea44f;
            --accent-expense: #da3637;
            --accent-active: #f0f6fc;
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.5;
            padding: 2rem 1rem;
        }

        .app-container {
            max-width: 800px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        @media (min-width: 768px) {
            .app-container {
                grid-template-columns: 1.2fr 1fr;
            }
            header, .full-width {
                grid-column: span 2;
            }
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.03em;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        /* Balance Dashboard */
        .balance-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
        }

        .board-card {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 1rem;
        }

        .board-card h3 {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
        }

        .board-card p {
            font-size: 1.25rem;
            font-weight: 700;
        }

        .board-card.balance p { color: #ffffff; }
        .board-card.income p { color: var(--accent-income); }
        .board-card.expenses p { color: var(--accent-expense); }

        /* Panels */
        .panel {
            background-color: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .panel h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #ffffff;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        label {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        input, select {
            width: 100%;
            background-color: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-primary);
            padding: 0.6rem 0.75rem;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus, select:focus {
            border-color: var(--text-secondary);
        }

        /* Framework-Free Toggle Switch */
        .type-toggle {
            display: grid;
            grid-template-columns: 1fr 1fr;
            background-color: var(--bg-main);
            padding: 0.25rem;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .type-toggle label {
            text-align: center;
            padding: 0.5rem;
            cursor: pointer;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.85rem;
            margin: 0;
            transition: all 0.2s;
            color: var(--text-secondary);
        }

        .type-toggle input {
            display: none;
        }

        .type-toggle input:checked + label.lbl-inc {
            background-color: var(--accent-income);
            color: white;
        }

        .type-toggle input:checked + label.lbl-exp {
            background-color: var(--accent-expense);
            color: white;
        }

        .btn {
            background-color: var(--bg-element);
            border: 1px solid var(--border-color);
            color: #ffffff;
            border-radius: 6px;
            padding: 0.7rem;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:hover { 
            background-color: transparent;
            border-color: var(--accent-active); 
        }
        
        .btn-sec {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 0.8rem;
            padding: 0.4rem 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-sec:hover {
            border-color: var(--accent-expense);
            color: var(--accent-expense);
        }

        /* Analytics Chart Metrics */
        .analytics-container {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .chart-row {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .chart-label-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
        }

        .chart-track {
            background-color: var(--bg-main);
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .chart-fill {
            height: 100%;
            width: 0%;
            transition: width 0.4s ease;
            border-radius: 3px;
        }

        /* History Ledger Layout */
        .filter-bar {
            display: flex;
            gap: 0.5rem;
        }

        .transaction-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            max-height: 400px;
            overflow-y: auto;
        }

        .transaction-item {
            background-color: var(--bg-main);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 0.6rem 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
        }

        .item-left {
            display: flex;
            flex-direction: column;
        }

        .item-meta {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .item-right {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .val-inc { color: var(--accent-income); font-weight: 600; }
        .val-exp { color: var(--accent-expense); font-weight: 600; }

        .btn-del {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.1rem;
        }
        .btn-del:hover { color: var(--accent-expense); }

        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
            padding: 2rem 0;
        }

        .system-actions {
            display: flex;
            gap: 0.5rem;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="full-width">
            <div>
                <h1>Ledger Pro</h1>
                <p class="subtitle">Advanced Financial Intelligence</p>
            </div>
            <div class="system-actions">
                <button class="btn-sec" id="btn-export">Export JSON</button>
                <button class="btn-sec" id="btn-clear">Purge</button>
            </div>
        </header>

        <section class="balance-board full-width">
            <div class="board-card balance">
                <h3>Net Capital</h3>
                <p id="dom-net">€0.00</p>
            </div>
            <div class="board-card income">
                <h3>Inflow</h3>
                <p id="dom-inflow">€0.00</p>
            </div>
            <div class="board-card expenses">
                <h3>Outflow</h3>
                <p id="dom-outflow">€0.00</p>
            </div>
        </section>

        <main class="panel">
            <h2>Record Transaction</h2>
            <form id="trans-form" style="display: flex; flex-direction: column; gap: 1rem;">
                <div class="type-toggle">
                    <input type="radio" name="tx-type" id="type-expense" value="expense" checked>
                    <label for="type-expense" class="lbl-exp">Expense</label>

                    <input type="radio" name="tx-type" id="type-income" value="income">
                    <label for="type-income" class="lbl-inc">Income</label>
                </div>

                <div class="form-group">
                    <label for="tx-desc">Description</label>
                    <input type="text" id="tx-desc" placeholder="Domain subscription, Supermarket, Drinks..." required>
                </div>

                <div class="form-group">
                    <label for="tx-amount">Amount (€)</label>
                    <input type="number" step="0.01" min="0.01" id="tx-amount" placeholder="0.00" required>
                </div>

                <div class="form-group">
                    <label for="tx-cat">Category</label>
                    <select id="tx-cat"></select>
                </div>

                <div class="form-group">
                    <label for="tx-date">Date</label>
                    <input type="date" id="tx-date" required>
                </div>

                <button type="submit" class="btn">Log Transaction</button>
            </form>
        </main>

        <aside style="display: flex; flex-direction: column; gap: 2rem;">
            <div class="panel">
                <h2>Categorical Allocation</h2>
                <div class="analytics-container" id="dom-analytics"></div>
            </div>

            <div class="panel">
                <div style="display: flex; justify-content: space-between; align-items: center; gap: 0.5rem;">
                    <h2>History</h2>
                    <div class="filter-bar">
                        <select id="filter-cat" style="padding: 0.25rem; font-size: 0.75rem; width: auto;"></select>
                    </div>
                </div>
                <ul class="transaction-list" id="dom-list"></ul>
            </div>
        </aside>
    </div>

    <script>
        // --- Core Application Settings Matrix ---
        const CONFIG = {
            categories: {
                expense: ['Infrastructure / Domains', 'Shopping', 'Snacks', 'SaaS / Tools', 'Utilities', 'Miscellaneous'],
                income: ['Freelance', 'Product Sales', 'Grants / Other']
            },
            // High contrast chart visualization tokens avoiding deep blues
            colors: ['#8b949e', '#c9d1d9', '#484f58', '#21262d', '#30363d', '#8b949e']
        };

        // --- Context Architecture State ---
        let state = {
            transactions: JSON.parse(localStorage.getItem('pro_ledger_data')) || []
        };

        // --- DOM Cache Engine ---
        const DOM = {
            form: document.getElementById('trans-form'),
            typeExpense: document.getElementById('type-expense'),
            typeIncome: document.getElementById('type-income'),
            desc: document.getElementById('tx-desc'),
            amount: document.getElementById('tx-amount'),
            cat: document.getElementById('tx-cat'),
            date: document.getElementById('tx-date'),
            net: document.getElementById('dom-net'),
            inflow: document.getElementById('dom-inflow'),
            outflow: document.getElementById('dom-outflow'),
            analytics: document.getElementById('dom-analytics'),
            list: document.getElementById('dom-list'),
            filterCat: document.getElementById('filter-cat'),
            btnExport: document.getElementById('btn-export'),
            btnClear: document.getElementById('btn-clear')
        };

        // --- Controller Initialization ---
        
        function initApp() {
            DOM.date.value = new Date().toISOString().split('T')[0];
            
            DOM.typeExpense.addEventListener('change', syncCategoryOptions);
            DOM.typeIncome.addEventListener('change', syncCategoryOptions);
            DOM.form.addEventListener('submit', handleFormSubmit);
            DOM.filterCat.addEventListener('change', renderLedger);
            DOM.btnExport.addEventListener('click', exportDatabase);
            DOM.btnClear.addEventListener('click', purgeDatabase);

            syncCategoryOptions();
            buildGlobalFilters();
            renderUI();
        }

        function syncCategoryOptions() {
            const mode = DOM.typeExpense.checked ? 'expense' : 'income';
            DOM.cat.innerHTML = CONFIG.categories[mode]
                .map(cat => `<option value="${cat}">${cat}</option>`).join('');
        }

        function buildGlobalFilters() {
            const combined = [...CONFIG.categories.expense, ...CONFIG.categories.income];
            DOM.filterCat.innerHTML = '<option value="ALL">All Categories</option>' + 
                combined.map(cat => `<option value="${cat}">${cat}</option>`).join('');
        }

        function handleFormSubmit(e) {
            e.preventDefault();

            const isExpense = DOM.typeExpense.checked;
            const txValue = parseFloat(DOM.amount.value);
            
            const payload = {
                id: crypto.randomUUID ? crypto.randomUUID() : Math.floor(Math.random() * 10000000).toString(),
                description: DOM.desc.value.trim(),
                type: isExpense ? 'expense' : 'income',
                amount: txValue,
                category: DOM.cat.value,
                date: DOM.date.value
            };

            state.transactions.unshift(payload);
            commitState();
            
            DOM.desc.value = '';
            DOM.amount.value = '';
            DOM.desc.focus();
        }

        function removeTransaction(id) {
            state.transactions = state.transactions.filter(t => t.id !== id);
            commitState();
        }

        function commitState() {
            localStorage.setItem('pro_ledger_data', JSON.stringify(state.transactions));
            renderUI();
        }

        // --- Render Cycles ---
        
        function renderUI() {
            calculateMetrics();
            renderAnalyticsCharts();
            renderLedger();
        }

        function calculateMetrics() {
            let inflow = 0;
            let outflow = 0;

            state.transactions.forEach(t => {
                if (t.type === 'income') inflow += t.amount;
                else outflow += t.amount;
            });

            DOM.net.innerText = `€${(inflow - outflow).toFixed(2)}`;
            DOM.inflow.innerText = `+€${inflow.toFixed(2)}`;
            DOM.outflow.innerText = `-€${outflow.toFixed(2)}`;
        }

        function renderAnalyticsCharts() {
            DOM.analytics.innerHTML = '';
            
            const expenses = state.transactions.filter(t => t.type === 'expense');
            if (expenses.length === 0) {
                DOM.analytics.innerHTML = '<p class="empty-state">No dynamic asset deployment tracked.</p>';
                return;
            }

            const aggregated = {};
            let totalPool = 0;

            expenses.forEach(t => {
                aggregated[t.category] = (aggregated[t.category] || 0) + t.amount;
                totalPool += t.amount;
            });

            const sorted = Object.entries(aggregated).sort((a,b) => b[1] - a[1]);

            sorted.forEach(([category, volume], index) => {
                const percentage = ((volume / totalPool) * 100).toFixed(0);
                const color = CONFIG.colors[index % CONFIG.colors.length];

                const row = document.createElement('div');
                row.className = 'chart-row';
                row.innerHTML = `
                    <div class="chart-label-row">
                        <span>${category} (${percentage}%)</span>
                        <span style="font-weight:600;">€${volume.toFixed(2)}</span>
                    </div>
                    <div class="chart-track">
                        <div class="chart-fill" style="width: ${percentage}%; background-color: ${color};"></div>
                    </div>
                `;
                DOM.analytics.appendChild(row);
            });
        }

        function renderLedger() {
            DOM.list.innerHTML = '';
            const activeFilter = DOM.filterCat.value;

            const targets = state.transactions.filter(t => {
                return activeFilter === 'ALL' || t.category === activeFilter;
            });

            if (targets.length === 0) {
                DOM.list.innerHTML = '<li class="empty-state">No context matching filter rules.</li>';
                return;
            }

            targets.forEach(t => {
                const li = document.createElement('li');
                li.className = 'transaction-item';
                const isInc = t.type === 'income';
                
                const formattedDate = new Date(t.date).toLocaleDateString(undefined, {
                    month: 'short', day: 'numeric', year: 'numeric'
                });

                li.innerHTML = `
                    <div class="item-left">
                        <span style="font-weight:500;">${t.description}</span>
                        <span class="item-meta">${t.category} &bull; ${formattedDate}</span>
                    </div>
                    <div class="item-right">
                        <span class="${isInc ? 'val-inc' : 'val-exp'}">
                            ${isInc ? '+' : '-'}€${t.amount.toFixed(2)}
                        </span>
                        <button class="btn-del" title="Delete record">&times;</button>
                    </div>
                `;

                li.querySelector('.btn-del').addEventListener('click', () => removeTransaction(t.id));
                DOM.list.appendChild(li);
            });
        }

        // --- IO & Persistence Operations ---
        
        function exportDatabase() {
            if (state.transactions.length === 0) return alert("Database ledger context state is empty.");
            
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state.transactions, null, 2));
            const dlAnchor = document.createElement('a');
            dlAnchor.setAttribute("href", dataStr);
            dlAnchor.setAttribute("download", `ledger_pro_export_${new Date().toISOString().split('T')[0]}.json`);
            document.body.appendChild(dlAnchor);
            dlAnchor.click();
            dlAnchor.remove();
        }

        function purgeDatabase() {
            if (confirm("Are you certain you want to destroy all local persistence store entries?")) {
                state.transactions = [];
                commitState();
            }
        }

        initApp();
    </script>
</body>
</html>
