    <style>
      .placeholderText {
        opacity: 0.3;
        text-align: center;
      }

      div.dot-container {
        width: 100vw;
        height: 100vh;
        background-color: black;
        position: fixed;
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 4px;
      }
      .dot-container span {
        width: 1rem;
        height: 1rem;
        background-color: #ffa500;
        border-radius: 50%;
        animation: bounce 1.5s linear infinite;
      }
      @keyframes bounce {
        0% {
          transform: translateY(0);
          opacity: 1;
        }
        50% {
          transform: translateY(6px);
          opacity: 0.5;
        }
        100% {
          transform: translateY(0);
          opacity: 1;
        }
      }
      .dot-container span:nth-child(2) {
        animation-delay: 0.5s;
      }
      .dot-container span:nth-child(3) {
        animation-delay: 1s;
      }
      .dot-container.hide {
        display: none;
      }
    </style>
  </head>
  <header class="header">

    <nav style="display: inline-flex">

  <body>
    <div class="dot-container"></div>
         <!--TOAST MESSAGES-->
        <div id="toast"></div>
<!--MODAL CONTAINER-->
    <div id="modalContainer"></div>


    <div id="dashboard-content">
              <div class="section-header"><h2>Overview</h2></div>

      <section id="statsCards">
        <div id="allProperties" class="statsCard">
          <h3>Property Count</h3>
          <p id="allPropertiesCount">0</p>
        </div>
        <div id="rentedProperty" class="statsCard">
          <h3>Rented / Leased</h3>
          <p id="rentedPropertyCount">0</p>
        </div>
        <div id="availableProperty" class="statsCard">
          <h3>Available</h3>
          <p id="availablePropertyCount">0</p>
        </div>
      </section>
      <section id="property-table-section">
        <div class="section-header"><h2>Properties</h2> <button type="button" class="btn-primary btn add-property">Add Property</button></div>


        <div id="detailsCard"></div>
      </section>
    </div>

    <script type="module">
      import { initDashboard } from '../js/dashboard/dashboard.js';
      import { loadComponent } from "https://scybud.github.io/scybud-ui/js/ui.js";
      import { handleFormSteps } from "../js/create/add-property.js";

      document.addEventListener("DOMContentLoaded", () => {
          // Fire core dashboard fetch logic loops
          initDashboard();

          // Bind modal actions
          const addPropertyBtn = document.querySelectorAll(".add-property");
          addPropertyBtn.forEach((btn) => {
              btn.addEventListener("click", async () => {
                  await loadComponent(
                      "../components/modals/add-property.html",
                      "modalContainer"
                  );
                  await handleFormSteps();
              });
          });
      });
    </script>

        <script type="module" src="../js/auth/auth.js"></script>
