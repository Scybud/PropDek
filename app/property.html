<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8" />
    <title>EstateHub | Property Details</title>
    <style>
      /* Reset */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* Page Styling */
      body {
        background: linear-gradient(180deg, #0a0a0a, #252525);
        min-height: 100vh;
        width: 100%;
        font-family: "Poppins", Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        color: #fff;
        padding: 30px 15px;
      }

      /* Title */
      h2 {
        font-size: 2rem;
        font-weight: 600;
        background: linear-gradient(130deg, #ffae00, #fff700);
        -webkit-background-clip: text;
        color: transparent;
        margin-bottom: 20px;
        text-align: center;
      }

      /* Card Container */
      #details {
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 230, 0, 0.2);
        padding: 25px;
        width: 100%;
        max-width: 600px;
        border-radius: 12px;
        backdrop-filter: blur(6px);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        animation: fadeIn 0.4s ease-in-out;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      /* Typography */
      #details h3 {
        font-size: 1.6rem;
        color: #ffe600;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        padding-bottom: 10px;
        margin-bottom: 5px;
      }

      #details p {
        font-size: 0.95rem;
        line-height: 1.5;
        color: #e2e8f0;
      }

      strong {
        color: #ffdb4c;
        font-weight: 500;
      }

      /* Sub-units Section Style */
      .units-section {
        margin-top: 15px;
        border-top: 1px dashed rgba(255, 255, 255, 0.1);
        padding-top: 15px;
      }

      .units-section h4 {
        color: #ffe600;
        font-size: 1.1rem;
        margin-bottom: 10px;
      }

      .units-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 10px;
      }

      .unit-pill {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid #333;
        padding: 8px 12px;
        border-radius: 6px;
        font-size: 0.85rem;
      }

      .unit-pill span {
        display: block;
        font-size: 0.75rem;
        color: #a0aec0;
        margin-top: 2px;
      }

      /* Back Button */
      .btn {
        text-decoration: none;
        margin-top: 25px;
        padding: 12px 25px;
        border-radius: 8px;
        font-size: 1rem;
        border: none;
        background: linear-gradient(90deg, #ffe600, #ffad00);
        color: #000;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.25s, box-shadow 0.25s;
      }

      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 0 10px rgba(255, 230, 0, 0.4);
      }

      /* Loading indicator placement */
      .loading-text {
        text-align: center;
        color: #a0aec0;
        font-style: italic;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <h2>Property Details</h2>

    <div id="details">
      <p class="loading-text">Fetching live database record...</p>
    </div>

    <a class="btn" href="dashboard.html">← Back to Dashboard</a>

    <script type="module" src="../js/auth/auth.js"></script>
    <script type="module" src="../js/dashboard/propertyDetails.js"></script>
  </body>
</html>
